language: 'typescript'
layer: 'application'
stack: 'frontend'
tags:
  - 'docs'
  - 'docusaurus'

project:
  title: 'github-token-broker docs'
  description: 'Docusaurus documentation site for the github-token-broker service.'
  owner: '@meigma'
  maintainers:
    - '@meigma'

toolchains:
  default: 'node'

fileGroups:
  configs:
    - 'docusaurus.config.ts'
    - 'tsconfig.json'
    - 'package.json'
    - 'package-lock.json'
  sources:
    - 'docs/**/*'
    - 'src/**/*'
    - 'static/**/*'

tasks:
  build:
    command: 'npm run build'
    toolchains: ['javascript', 'node', 'npm']
    inputs:
      - '@group(configs)'
      - '@group(sources)'
    outputs:
      - 'build/**/*'

  typecheck:
    command: 'npm run typecheck'
    toolchains: ['javascript', 'node', 'npm']
    inputs:
      - '@group(configs)'
      - '@group(sources)'

  check:
    deps:
      - '~:typecheck'
      - '~:build'
