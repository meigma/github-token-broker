name: Reusable Release

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Build Lambda zip
        shell: bash
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          rm -rf build dist
          mkdir -p build dist
          go build \
            -buildvcs=false \
            -tags lambda.norpc \
            -trimpath \
            -ldflags="-s -w" \
            -o build/bootstrap \
            ./cmd/github-token-broker
          (cd build && zip -X ../dist/github-token-broker.zip bootstrap)

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum github-token-broker.zip > checksums.txt
          cat checksums.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: dist/github-token-broker.zip
          format: spdx-json
          output-file: dist/github-token-broker.zip.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/github-token-broker.zip
          predicate-type: https://spdx.dev/Document
          predicate-path: dist/github-token-broker.zip.spdx.json

      - name: Upload Lambda zip to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "${TAG}" dist/github-token-broker.zip --clobber
