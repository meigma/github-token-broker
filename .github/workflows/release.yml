name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-draft-release:
    runs-on: ubuntu-latest
    permissions:
      # contents: write is required to view draft releases via the Releases
      # API — with contents: read, gh release view returns 404 for drafts.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Wait for draft release handoff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/wait-for-draft-release.sh

  release:
    needs: verify-draft-release
    uses: ./.github/workflows/reusable-release.yml
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      tag: ${{ github.ref_name }}

  publish-draft-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-draft-release.sh
